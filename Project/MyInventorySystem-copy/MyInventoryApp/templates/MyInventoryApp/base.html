{% load static %}


<html>
    <head>
        <title>Buy A Bottle</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Material+Icons">
        <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
        <link rel="stylesheet" href="{% static 'bootstrap/css/custom.css' %}">

        <script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    </head>
    <body style="min-height: 100vh; display: flex; flex-direction: column;">
        <nav class="navbar navbar-dark bg-custom mb-3 sticky-top" style="background-color: #722F37;">
            {% block comment %}
                <div class="container-fluid">
                    <a class="navbar-brand mb-0" href="{% url 'view_supplier' %}">Suppliers</a>
                    <a class="navbar-brand mb-0" href="{% url 'view_bottles' %}">Bottles</a>
                    <a class="navbar-brand mb-0" href="{% url 'add_bottle' %}">Add Bottle</a>
                    {% if current_user_id %}
                        <a class="navbar-brand mb-0" href="{% url 'manage_account' current_user_id %}">Manage Account</a>
                    {% endif %}
                </div>
            {% endblock %} 
        </nav>
            <div style = "flex: 1">
                {% block content %}
                {% endblock %}
            </div>
                
        <footer class="footer bg-custom" style="background-color: #722F37;">

            <!-- Copyright -->
            <div class="container">&copy; 2026</div>
            <!-- Copyright -->
          
        </footer>
    </body>
</html>
