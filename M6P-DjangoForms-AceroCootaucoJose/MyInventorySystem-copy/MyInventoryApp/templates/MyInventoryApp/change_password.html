{% extends 'MyInventoryApp/base.html' %}

{% block content %}
<div class="col-md-6 offset-md-3 mt-5">
    <div class="p-3 text-white text-center" style="background-color: #590404; border-radius: 5px 5px 0 0;">
        <h4 class="mb-0">Change Password</h4>
    </div>

    <div class="p-4 border bg-white shadow-sm" style="border-radius: 0 0 5px 5px;">
        
        {% if error %}
            <div class="alert alert-danger text-center">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{% url 'change_password' account.pk %}">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Current Password</label>
                <input type="password" name="current_password" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" name="new_password" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control" required>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <button type="submit" class="btn text-white px-4" style="background-color: #590404;">
                    Confirm
                </button>
                
                <a href="{% url 'manage_account' account.pk %}" class="btn btn-outline-secondary px-4">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
