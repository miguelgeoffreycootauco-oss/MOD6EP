<form method = "POST" action="{% url 'signup' %}" class = "card p-4 shadow">
    {% csrf_token %} <h3 class = "text-center"> Create Account</h3>
    
    {% if error%} 
        <div class="alert alert-warning" role="alert"> {{ error }} </div> 
    {% endif %}
            
    <div class="form-group mb-3"></div>
        <label> Username: </label>
        <input type="text" name = "username" class="form-control" required>
    </div>

    <div class="form-group mb-3">
        <label> Password: </label>
        <input type="password" name = "password" class="form-control" required>
    </div>

    <button type="submit" class="mt-3 btn btn-primary">Signup</button>

    <a href = "{% url 'login' %}" class = "mt-3 btn btn-secondary">Login</a>
</form>
